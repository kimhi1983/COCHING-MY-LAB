<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=1400" />
    <meta content="images/og-img.jpg" property="og:image" />
    <meta name="format-detection" content="telephone=no, address=no, email=no" />
    <meta name="og:title" content="" />
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>COCHING</title>
  </head>

  <body>
    <!--nav-->
    <nav>
      <!--btn-acd-->
      <button type="button" class="btn-acd"><span class="ic-md ic-arrow-right-primary"></span></button>
      <!--header-->
      <div class="header">
        <!--logo-->
        <a href="index.html" class="logo">
          <img src="images/logo.png" alt="COCHING" />
        </a>
        <!--my-profile-->
        <div class="my-profile">
          <div class="img">
            <img src="images/ic-profile.svg" alt="profile" />
          </div>
          <div class="my-id">K-pros</div>
          <button type="button" class="btn btn-sm btn-primary">로그인</button>
          <!--로그아웃-->
          <!-- <button type="button" class="btn btn-sm btn-gray-outline">로그아웃</button> -->
        </div>
      </div>
      <!--body-->
      <div class="body scroller">
        <div class="gnb">
          <div class="group">
            <!--현재페이지 active-->
            <a href="javascript:;" class="ic-home-md">홈</a>
          </div>
          <div class="group">
            <label>원료</label>
            <a href="javascript:;" class="ic-drop-md">원료 등록 및 관리</a>
            <a href="javascript:;" class="ic-trash-md">휴지통</a>
            <a href="javascript:;" class="ic-user-md">담당자 지정</a>
          </div>
          <div class="group">
            <a href="javascript:;" class="ic-book-md">원료 등록 가이드</a>
            <a href="javascript:;" class="ic-faq-md">자주 묻는 질문</a>
          </div>
          <div class="group">
            <a href="javascript:;" class="ic-setting-md active">계정관리</a>
          </div>
        </div>
      </div>
      <!--footer-->
      <div class="footer">
        <button type="button" class="btn btn-md btn-primary-outline w-100">COCHING 홈페이지</button>
      </div>
    </nav>

    <!--wrap-->
    <div class="wrap">
      <!--section-->
      <section class="h-100">
        <div class="container h-100">
          <div class="content-wrap h-100">
            <!--title-->
            <div class="h1">계정 등록</div>
            <!--content-->
            <div class="content-inner h-100 account-wrap">
              <!--account-edit-->
              <div class="account-edit">
                <!--img-->
                <div class="img">
                  <img src="images/ic-profile.svg" alt="profile" />
                </div>
                <!--form-->
                <form>
                  <!--input-wrap-->
                  <div class="input-wrap">
                    <div class="input-half">
                      <div class="label-set">
                        <label>이름<span class="text-primary">*</span></label>
                        <div class="input-set">
                          <input type="text" placeholder="이름을 입력해 주세요" />
                        </div>
                      </div>
                      <div class="label-set">
                        <label>아이디<span class="text-primary">*</span></label>
                        <div class="input-set">
                          <input type="text" placeholder="아이디를 입력해 주세요" />
                        </div>
                      </div>
                    </div>
                    <div class="input-half">
                      <div class="label-set">
                        <label>연락처<span class="text-primary">*</span></label>
                        <div class="input-set">
                          <input type="tel" placeholder="'-'없이 입력해 주세요" />
                        </div>
                      </div>
                      <div class="label-set">
                        <label>이메일<span class="text-primary">*</span></label>
                        <div class="input-set">
                          <input type="email" placeholder="이메일을 입력해 주세요" />
                        </div>
                      </div>
                    </div>
                    <div class="input-half">
                      <div class="label-set">
                        <label>비밀번호<span class="text-primary">*</span></label>
                        <div class="input-set">
                          <input type="password" placeholder="새 비밀번호" />
                        </div>
                      </div>
                      <div class="label-set">
                        <label>비밀번호 확인<span class="text-primary">*</span></label>
                        <div class="input-set">
                          <input type="password" placeholder="다시 한번 입력하세요" />
                        </div>
                      </div>
                    </div>
                  </div>
                  <!--button-->
                  <div class="btn-area">
                    <button type="button" class="btn btn-lg btn-gray">취소</button>
                    <button type="button" class="btn btn-lg btn-primary">등록하기</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </section>
      <!--footer-->
      <footer>
        <div class="inner">
          <div class="container">
            <!--top-->
            <div class="top">
              <div class="left">
                <div class="logo">
                  <img src="images/logo-gray.svg" alt="COCHING" />
                </div>
              </div>
              <div class="right">
                <a href="javascript:;">이용약관</a>
                <a href="javascript:;">개인정보처리방침</a>
              </div>
            </div>
            <!--bottom-->
            <div class="bottom">
              <div class="left">
                <ul>
                  <li>경기도 광명시 일직로 43, GIDC A2 602호</li>
                </ul>
                <ul>
                  <li>대표 : 오원석</li>
                  <li>사업자등록번호 : 000-00-000000</li>
                  <li>메일 : coching@coching.co.kr</li>
                  <li>통신판매업 신고번호 : 2000-광명일직A-0000호</li>
                  <a href="javascript:;" class="btn-info">사업자 정보</a>
                </ul>
              </div>
              <div class="right">© COCHING All rights reserved.</div>
            </div>
          </div>
        </div>
      </footer>
    </div>

    <!--back-to-top-->
    <div id="back-to-top"></div>

    <!-- script -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
    <script src="js/script.js"></script>

    <!-- scroll -->
    <script src="js/jquery.nicescroll.min.js"></script>
  </body>
</html>
