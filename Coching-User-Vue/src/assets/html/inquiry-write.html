<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="initial-scale=1.0,user-scalable=no,maximum-scale=1,width=device-width" />
    <meta content="images/og-img.jpg" property="og:image" />
    <meta name="format-detection" content="telephone=no, address=no, email=no" />
    <meta name="og:title" content="" />
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>COCHING</title>
  </head>

  <body>
    <!--header-->
    <header>
      <div class="inner">
        <div class="container">
          <!--left-->
          <div class="left flex">
            <div class="ic-wrap menu-wrap m-none">
              <div class="ic-lg ic-menu"></div>
            </div>
            <!--logo-->
            <a href="index.html" class="logo">
              <img src="images/logo.svg" alt="COCHING" />
            </a>
          </div>
          <!--right-->
          <div class="right">
            <!--login-->
            <div class="login flex m-none">
              <button type="button" class="btn btn-sm btn-primary">로그인</button>
              <button type="button" class="btn btn-sm btn-primary-outline">회원가입</button>
            </div>
            <!--mobile menu-->
            <div class="ic-wrap menu-wrap pc-none">
              <div class="ic-lg ic-menu"></div>
            </div>
          </div>
        </div>
        <!--search-->
        <div class="main-search">
          <form>
            <!--search-wrap-->
            <div class="search-wrap">
              <button type="button" class="ic-lg ic-arrow-left-long"></button>
              <!--input-->
              <div class="search-input-wrap">
                <input type="search" placeholder="글리세린(glycerin)" id="searchInput" />
              </div>
              <!--btn-->
              <div class="btn-wrap">
                <button type="submit" class="ic-lg ic-search"></button>
                <button type="button" class="ic-lg ic-hash"></button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </header>
    <!--wrap-->
    <div class="wrap">
      <!--nav-->
      <nav class="scroller m-none">
        <!--lg-->
        <div class="lg">
          <!--gnb-->
          <div class="gnb">
            <!--group-->
            <div class="group">
              <!--해당 페이지 active-->
              <a href="javascript:;" class="ic-home-lg">홈</a>
              <a href="javascript:;" class="ic-tv-lg">코칭 TV</a>
            </div>
            <!--group-->
            <div class="group gnb-acd block">
              <div class="title">알림함</div>
              <div class="gnb-wrap">
                <a href="javascript:;" class="ic-noti-lg">알림함</a>
                <a href="javascript:;" class="ic-list-lg">원료요청</a>
                <a href="javascript:;" class="ic-message-lg">쪽지함</a>
              </div>
            </div>

            <!--group-->
            <div class="group">
              <a href="javascript:;" class="ic-drop-lg">원료소싱</a>
              <a href="javascript:;" class="ic-speaker-lg">공지사항</a>
              <a href="javascript:;" class="ic-book-lg">사용자 매뉴얼</a>
              <a href="javascript:;" class="ic-chats-lg active">1:1 문의하기</a>
            </div>
          </div>
          <!--footer-->
          <div class="footer">
            <div class="top">
              <div>이용약관</div>
              <div>개인정보처리방침</div>
            </div>
            <div class="info">
              <ul>
                <li>경기도 광명시 일직로 43, GIDC A2 602호</li>
                <li>대표 : 오원석</li>
                <li>사업자등록번호 : 316-81-29819</li>
                <li>통신판매업 신고번호 : 2000-광명일직A-0000호</li>
              </ul>
            </div>
            <div class="info">© COCHING All rights reserved.</div>
          </div>
        </div>
        <!--sm-->
        <div class="sm">
          <!--해당 페이지 active-->
          <a href="javascript:;" class="ic-home-lg">홈</a>
          <a href="javascript:;" class="ic-tv-lg">코칭 TV</a> <a href="javascript:;" class="ic-noti-lg">알림함</a> <a href="javascript:;" class="ic-drop-lg">원료소싱</a><a href="javascript:;" class="ic-speaker-lg">공지사항</a>
          <a href="javascript:;" class="ic-chats-lg active">문의하기</a>
        </div>
      </nav>
      <!--section은 3가지 타입 full, main-->
      <section>
        <div class="container h-100">
          <!--content-->
          <div class="content">
            <!--common-content-->
            <div class="common-content">
              <!--title-wrap-->
              <div class="title-wrap">
                <div class="h1 text-center">1:1 문의하기</div>
              </div>
              <!--write-view-->
              <div class="write-view">
                <!--input-->
                <form class="write-form">
                  <div class="inner">
                    <div class="input-line">
                      <div class="input-set">
                        <input type="text" class="input-lg" placeholder="제목을 입력해 주세요" />
                      </div>
                    </div>
                    <div class="flex">
                      <div class="input-set">
                        <select class="custom-select" placeholder="문의유형">
                          <option value="">문의유형 01</option>
                          <option value="">문의유형 02</option>
                          <option value="">문의유형 03</option>
                          <option value="">문의유형 04</option>
                        </select>
                      </div>
                      <div class="input-set">
                        <input type="tel" placeholder="전화번호를 입력해주세요" />
                      </div>
                      <div class="input-set">
                        <input type="email" placeholder="이메일 주소를 입력해주세요" />
                      </div>
                    </div>
                    <div class="textarea-wrap">
                      <textarea placeholder="내용을 입력해 주세요"></textarea>
                    </div>
                    <!--upload-->
                    <div class="upload-wrap">
                      <div class="upload-area">
                        <input type="file" class="file-input" multiple />
                        <div class="file-list"></div>
                      </div>
                    </div>
                  </div>
                  <!--button-->
                  <div class="btn-area">
                    <button type="button" class="btn btn-lg btn-gray">취소</button>
                    <button type="button" class="btn btn-lg btn-primary">등록하기</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!--back-to-top-->
    <div id="back-to-top"></div>

    <!-- script -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
    <script src="js/script.js"></script>

    <!-- scroll -->
    <script src="js/jquery.nicescroll.min.js"></script>

    <!-- scroller-x -->
    <script src="js/scroller-x.js"></script>
  </body>
</html>
