<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="initial-scale=1.0,user-scalable=no,maximum-scale=1,width=device-width" />
    <meta content="images/og-img.jpg" property="og:image" />
    <meta name="format-detection" content="telephone=no, address=no, email=no" />
    <meta name="og:title" content="" />
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <!--tippy-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tippy.js/6.3.7/animations/shift-toward.min.css" />
    <title>COCHING</title>
  </head>

  <body>
    <div class="container sm h-100">
      <div class="error-wrap">
        <div class="img">
          <div class="error"></div>
        </div>
        <div class="title-wrap">
          <div class="title">페이지를 찾을 수 없습니다.</div>
          <div class="info">접근 주소 경로 오류 혹은 제공하지 않는 페이지입니다.</div>
        </div>
        <div class="btn-area">
          <button type="button" class="btn btn-lg btn-primary-outline">이전페이지</button>
          <button type="button" class="btn btn-lg btn-primary">홈으로</button>
        </div>
      </div>
    </div>
    <!--js-->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!--lottie-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.14/lottie.min.js"></script>

    <script>
      var animation1 = bodymovin.loadAnimation({
        container: $(".error-wrap .error")[0],
        path: "js/error.json",
        renderer: "svg",
        loop: true,
        autoplay: true,
      });
    </script>
  </body>
</html>
