<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="initial-scale=1.0,user-scalable=no,maximum-scale=1,width=device-width" />
    <meta content="images/og-img.jpg" property="og:image" />
    <meta name="format-detection" content="telephone=no, address=no, email=no" />
    <meta name="og:title" content="" />
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>COCHING</title>
  </head>

  <body>
    <!--header-->
    <header>
      <div class="inner">
        <div class="container">
          <!--left-->
          <div class="left flex">
            <div class="ic-wrap menu-wrap m-none">
              <div class="ic-lg ic-menu"></div>
            </div>
            <!--logo-->
            <a href="index.html" class="logo">
              <img src="images/logo.svg" alt="COCHING" />
            </a>
          </div>
          <!--right-->
          <div class="right">
            <!--login-->
            <div class="login flex m-none">
              <button type="button" class="btn btn-sm btn-primary">로그인</button>
              <button type="button" class="btn btn-sm btn-primary-outline">회원가입</button>
            </div>
            <!--mobile menu-->
            <div class="ic-wrap menu-wrap pc-none">
              <div class="ic-lg ic-menu"></div>
            </div>
          </div>
        </div>
        <!--search-->
        <div class="main-search">
          <form>
            <!--search-wrap-->
            <div class="search-wrap">
              <button type="button" class="ic-lg ic-arrow-left-long"></button>
              <!--input-->
              <div class="search-input-wrap">
                <input type="search" placeholder="글리세린(glycerin)" id="searchInput" />
              </div>
              <!--btn-->
              <div class="btn-wrap">
                <button type="submit" class="ic-lg ic-search"></button>
                <button type="button" class="ic-lg ic-hash"></button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </header>
    <!--wrap-->
    <div class="wrap">
      <!--nav-->
      <nav class="scroller m-none">
        <!--lg-->
        <div class="lg">
          <!--gnb-->
          <div class="gnb">
            <!--group-->
            <div class="group">
              <!--해당 페이지 active-->
              <a href="javascript:;" class="ic-home-lg">홈</a>
              <a href="javascript:;" class="ic-tv-lg">코칭 TV</a>
            </div>
            <!--group-->
            <div class="group gnb-acd block">
              <div class="title">알림함</div>
              <div class="gnb-wrap">
                <a href="javascript:;" class="ic-noti-lg">알림함</a>
                <a href="javascript:;" class="ic-list-lg">원료요청</a>
                <a href="javascript:;" class="ic-message-lg">쪽지함</a>
              </div>
            </div>

            <!--group-->
            <div class="group">
              <a href="javascript:;" class="ic-drop-lg">원료소싱</a>
              <a href="javascript:;" class="ic-speaker-lg">공지사항</a>
              <a href="javascript:;" class="ic-book-lg">사용자 매뉴얼</a>
              <a href="javascript:;" class="ic-chats-lg">1:1 문의하기</a>
            </div>
          </div>
          <!--footer-->
          <div class="footer">
            <div class="top">
              <div>이용약관</div>
              <div>개인정보처리방침</div>
            </div>
            <div class="info">
              <ul>
                <li>경기도 광명시 일직로 43, GIDC A2 602호</li>
                <li>대표 : 오원석</li>
                <li>사업자등록번호 : 316-81-29819</li>
                <li>통신판매업 신고번호 : 2000-광명일직A-0000호</li>
              </ul>
            </div>
            <div class="info">© COCHING All rights reserved.</div>
          </div>
        </div>
        <!--sm-->
        <div class="sm">
          <!--해당 페이지 active-->
          <a href="javascript:;" class="ic-home-lg">홈</a>
          <a href="javascript:;" class="ic-tv-lg">코칭 TV</a> <a href="javascript:;" class="ic-noti-lg">알림함</a> <a href="javascript:;" class="ic-drop-lg">원료소싱</a><a href="javascript:;" class="ic-speaker-lg">공지사항</a>
          <a href="javascript:;" class="ic-chats-lg">문의하기</a>
        </div>
      </nav>
      <!--section은 3가지 타입 full, main-->
      <section>
        <div class="container h-100">
          <!--content-->
          <div class="content">
            <!--common-content-->
            <div class="common-content">
              <!--title-wrap-->
              <div class="title-wrap">
                <div class="h1 text-center">개인정보</div>
                <!--link-box-wrap-->
                <div class="link-box-wrap m-none">
                  <!--해당 페이지 btn-gray->btn-bk-->
                  <button type="button" class="btn btn-sm btn-gray">내가 쓴 글</button>
                  <button type="button" class="btn btn-sm btn-bk">개인정보</button>
                </div>
              </div>
              <!--my-info-wrap-->
              <div class="my-info-wrap">
                <form>
                  <!--my-profile-->
                  <div class="my-profile">
                    <div class="img-wrap">
                      <div class="img">
                        <img src="images/ic-profile.svg" alt="profile" />
                      </div>
                      <!-- <div class="img pr-txt pink-light">써니</div>
                      <div class="img pr-txt blue-light">써니</div>
                      <div class="img pr-txt orange">써니</div>
                      <div class="img pr-txt purple">썬</div> -->

                      <label class="btn-camera">
                        <div class="ic-md ic-camera-gray-md"></div>
                        <input type="file" accept="image/*" class="img-upload" style="display: none" />
                      </label>
                    </div>

                    <div class="my-id">sunnydyd</div>
                  </div>

                  <!--input-->
                  <div class="input-wrap">
                    <div class="label-set">
                      <label>이름<span class="text-primary">*</span> </label>
                      <div class="input-set">
                        <input type="text" value="이써니" />
                      </div>
                    </div>
                    <div class="label-set">
                      <label>연락처<span class="text-primary">*</span> </label>
                      <div class="input-set">
                        <input type="tel" value="01037406225" />
                      </div>
                    </div>
                    <div class="label-set">
                      <label>이메일<span class="text-primary">*</span> </label>
                      <div class="input-set">
                        <input type="email" value="sunnydyd@naver.com" />
                      </div>
                    </div>
                    <div class="pw-change-wrap">
                      <button type="button" class="btn btn-sm btn-gray">비밀번호 변경하기</button>
                      <div class="input-wrap">
                        <div class="label-set">
                          <label>현재 비밀번호<span class="text-primary">*</span> </label>
                          <div class="input-set">
                            <input type="password" />
                          </div>
                        </div>
                        <div class="label-set">
                          <label>새 비밀번호<span class="text-primary">*</span></label>
                          <div class="input-set">
                            <input type="password" /><!--성공 메세지 노출 active-->
                            <div class="info success active">10자 이상 입력</div>
                            <!--조건 충족 시 disabled 삭제-->
                            <div class="info success active disabled">영어 대/소문자, 숫자, 특수문자 중 2가지 이상 조합</div>
                          </div>
                        </div>
                        <div class="label-set">
                          <label>새 비밀번호 확인<span class="text-primary">*</span> </label>
                          <div class="input-set">
                            <input type="password" />
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                  <!--button-->
                  <div class="btn-area">
                    <button type="button" class="btn btn-lg btn-primary w-100">저장하기</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!--back-to-top-->
    <div id="back-to-top"></div>

    <!--profile-upload-->
    <div class="modal for-profile-upload">
      <div class="layer">
        <div class="layer-content">
          <!--md:450px, lg:800px 
          사이즈 조정 원하실 경우 style 직접 넣으세요 (예시:max-width:1000px)-->
          <div class="modal-inner modal-lg">
            <div class="modal-content">
              <div class="modal-body p-t-0">
                <div class="img-upload-edit">
                  <img src="images/img-logo-test.png" alt="img" />
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-lg btn-gray bottom-modal-close">취소</button>
                <button type="button" class="btn btn-lg btn-primary bottom-modal-close">등록하기</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- script -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
    <script src="js/script.js"></script>

    <!-- scroll -->
    <script src="js/jquery.nicescroll.min.js"></script>

    <!-- scroller-x -->
    <script src="js/scroller-x.js"></script>
  </body>
</html>
