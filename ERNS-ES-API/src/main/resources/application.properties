#profiles
spring.profiles.active=local

#logging
logging.level.org.springframework.boot.autoconfigure=ERROR

#Server
server.servlet.contextPath=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true

server.session.timeout=1800
server.shutdown=graceful

#common
spring.http.encoding.enable=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true
spring.lifecycle.timeout-per-shutdown-phase=20s

#JSP View
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

#mybatis
mybatis.type-aliases-package=com.erns.es/**/mapper/*.java
mybatis.mapper-locations=classpath:myBatis/mapper/**/*.xml
mybatis.config-location=classpath:myBatis/sql-mapper-config.xml

#rest-template
rest-template.max-connection-total=100
rest-template.max-connection-per-route=5
rest-template.read-timeout=5000
rest-template.connection-timeout=3000

#\uAE30\uD0C0\u0083\u0080
jackson.default-property-inclusion=null


#Note : \uB85C\uCEEC\uB9CC \uC0AC\uC6A9\u008C
#For Dev(devtools)
spring.devtools.livereload.enabled=true
spring.web.resources.static-locations=file:src/main/resources/static/
spring.thymeleaf.cache=false
spring.freemarker.cache=false
spring.groovy.template.cache=false
spring.mustache.cache=false


