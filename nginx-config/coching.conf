# COCHING Nginx 리버스 프록시 설정
# 파일 위치: /etc/nginx/sites-available/coching.conf
# 활성화: sudo ln -s /etc/nginx/sites-available/coching.conf /etc/nginx/sites-enabled/

# ─── 사용자 서비스 (coching.kr) ──────────────────────────────────────────────
server {
    listen 80;
    server_name coching.kr www.coching.kr localhost;

    # Cloudflare 실IP 복원
    real_ip_header CF-Connecting-IP;

    # Vue SPA (정적 파일)
    location / {
        proxy_pass http://127.0.0.1:9827;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Spring Boot User API
    location /api/ {
        proxy_pass http://127.0.0.1:8480/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # AI 처방 서버 (SSE 스트리밍 지원)
    location /api/ai/ {
        proxy_pass http://127.0.0.1:8420/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection '';          # SSE keepalive
        proxy_buffering off;                     # SSE 실시간 전송
        proxy_read_timeout 180s;                 # 처방 생성 최대 3분
        proxy_cache off;
        add_header X-Accel-Buffering no;
    }
}

# ─── 관리자 서비스 (bo.coching.kr) ───────────────────────────────────────────
server {
    listen 80;
    server_name bo.coching.kr;

    location / {
        proxy_pass http://127.0.0.1:9527;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8280/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}

# ─── 원료사 서비스 (partner.coching.kr) ──────────────────────────────────────
server {
    listen 80;
    server_name partner.coching.kr;

    location / {
        proxy_pass http://127.0.0.1:9727;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8380/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}

# ─── ES API (내부 전용, 외부 직접 접근 차단) ─────────────────────────────────
server {
    listen 127.0.0.1:8580;
    location / {
        proxy_pass http://127.0.0.1:9200;
    }
}
